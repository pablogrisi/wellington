<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellington</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <h1>Wellington</h1>
      <div class="actions-inline">
        <button id="pause-btn">Pause</button>
        <button id="resume-btn">Retomar</button>
        <button id="undo-btn">Voltar</button>
        <button id="new-game-btn">Nova partida</button>
      </div>
    </header>

    <section class="status" id="status"></section>

    <section class="table" id="table"></section>

    <section class="controls" id="controls"></section>

    <section class="log">
      <h2>Log</h2>
      <div id="log-list" class="log-list"></div>
    </section>
  </main>

  <div id="player-gate" class="player-gate hidden" role="dialog" aria-modal="true" aria-labelledby="player-gate-title">
    <form id="player-gate-form" class="player-gate-card">
      <h2 id="player-gate-title">Antes de jogar</h2>
      <p>Digite seu nome para iniciar a sua sessao.</p>
      <input id="player-name-input" type="text" maxlength="24" autocomplete="name" placeholder="Seu nome" required />
      <small id="player-gate-error" class="player-gate-error"></small>
      <button id="player-gate-submit" type="submit" class="primary">Entrar</button>
    </form>
  </div>

  <script src="/assets/script.js"></script>
</body>
</html>
