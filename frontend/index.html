<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellington</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <h1>Wellington</h1>
      <div class="actions-inline">
        <button id="pause-btn">Pause</button>
        <button id="resume-btn">Retomar</button>
        <button id="new-game-btn">Nova partida</button>
      </div>
    </header>

    <section class="status" id="status"></section>

    <section class="table" id="table"></section>

    <section class="controls" id="controls"></section>

    <section class="log">
      <h2>Log</h2>
      <div id="log-list" class="log-list"></div>
    </section>
  </main>

  <script src="/assets/script.js"></script>
</body>
</html>
