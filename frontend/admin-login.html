<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin - Wellington</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1f14;
      --panel: #142a1d;
      --border: #c9a84c;
      --text: #f0e8d0;
      --muted: #b9ad8a;
      --danger: #b33a3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, #1f4e33 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, #163d2a 0%, transparent 35%),
        var(--bg);
    }
    .panel {
      width: min(420px, 100%);
      background: rgba(20, 42, 29, 0.95);
      border: 1px solid rgba(201, 168, 76, 0.5);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.08em;
      color: var(--border);
      font-size: 24px;
      text-align: center;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      border: 1px solid rgba(201, 168, 76, 0.35);
      border-radius: 10px;
      padding: 12px;
      background: #0d1f14;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #c9a84c;
      color: #241700;
      font-weight: 800;
      padding: 11px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .error {
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
      color: #ffb1b1;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Wellington Admin</h1>
    <p>Acesso restrito ao painel de logs.</p>
    <form id="login-form">
      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button type="submit">Entrar</button>
      <div class="error" id="error"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const pass = document.getElementById('password');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.textContent = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ password: pass.value }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Falha no login.');
        }
        window.location.href = '/admin/logs';
      } catch (err) {
        error.textContent = err.message || 'Falha no login.';
      }
    });
  </script>
</body>
</html>
